name: monolith_convert_file_size
description: 'Computes a human-readable byte-size string (CommonSize) and a raw numeric size (ByteSize) from any size-bearing field on the event. Coalesces ModuleSize, Size, and VolumeMediaSize so module-load, file-write, and volume-mount events are all covered.'
visualization:
  options:
    columns:
    - fieldName: '@timestamp'
      format: datetime
      type: field
      width: 200
    - groupByPrefix: false
      header: Field List
      type: fieldList
    newestAtBottom: true
    showOnlyFirstLine: false
  type: list-view
labels:
- monolith_hunt_framework
- asset
- convert
- file_size
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ CONVERSION ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | ByteSize := coalesce([ModuleSize, Size, VolumeMediaSize])    // coalesce(): first non-null wins; unifies size fields across event types
  | case {                                                       // case {}: cascading thresholds (largest unit first)
      ByteSize >= 1099511627776                                  //   1 TB = 2^40
    | CommonSize := unit:convert(ByteSize, to=T)                 //   unit:convert(): scale bytes to terabytes
    | format("%,.2f TB", field=["CommonSize"], as="CommonSize"); //   format(): comma-thousands, 2 decimals, append unit
      ByteSize >= 1073741824                                     //   1 GB = 2^30
    | CommonSize := unit:convert(ByteSize, to=G)
    | format("%,.2f GB", field=["CommonSize"], as="CommonSize");
      ByteSize >= 1048576                                        //   1 MB = 2^20
    | CommonSize := unit:convert(ByteSize, to=M)
    | format("%,.2f MB", field=["CommonSize"], as="CommonSize");
      ByteSize > 1024                                            //   1 KB = 2^10
    | CommonSize := unit:convert(ByteSize, to=k)
    | format("%,.3f KB", field=["CommonSize"], as="CommonSize");
      *                                                          //   fallthrough: under 1 KB, render as raw bytes
    | CommonSize := format("%,.0f Bytes", field=["ByteSize"]);
  }
