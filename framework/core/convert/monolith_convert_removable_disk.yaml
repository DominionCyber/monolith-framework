name: monolith_convert_removable_disk
description: 'Rewrites IsOnRemovableDisk from 0/1 to No/Yes in place. Unknown values become Unknown. Use on any event carrying this field (FileWritten family, FsVolume* events).'
visualization:
  options:
    columns:
    - fieldName: '@timestamp'
      format: datetime
      type: field
      width: 200
    - groupByPrefix: false
      header: Field List
      type: fieldList
    newestAtBottom: true
    showOnlyFirstLine: false
  type: list-view
labels:
- monolith_hunt_framework
- asset
- convert
- removable_disk
- global
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ CONVERSION ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | case {                                                      // case {}: in-place rewrite of IsOnRemovableDisk
      IsOnRemovableDisk = "1" | IsOnRemovableDisk := "Yes";     //   1 = file on removable media
      IsOnRemovableDisk = "0" | IsOnRemovableDisk := "No";      //   0 = file on fixed media
      *                       | IsOnRemovableDisk := "Unknown"; //   anything else (null/missing) becomes Unknown
  }
