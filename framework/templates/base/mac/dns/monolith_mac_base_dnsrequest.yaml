name: monolith_mac_base_dnsrequest
description: Base query for DnsRequest events. Decodes and enriches DNS resolution data.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- dnsrequest
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=DnsRequest event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()       // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()  // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_dnsrequest()  // Decodes RequestType (8 values) and QueryStatus (4 error values) enums

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,             // Human-readable UTC event time (from helper)
          ContextTimeStamp,     // Raw event time on host (epoch + ms); no readable conversion yet
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,         // Endpoint hostname
          aid,                  // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,     // UPID of the resolving process; joins to ProcessRollup2
          ContextThreadId,      // Thread ID within the resolving process
          ContextBaseFileName,  // Basename of the resolving process binary (e.g. WeatherWidget)
          TreeId,               // Process tree ID; groups related events
          // ▰▰▰[ DNS Query ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          DomainName,           // Full domain queried (e.g. weather-edge.apple.com)
          BaseDomainName,       // Registrable portion of DomainName (sparse in this sample but schema-defined)
          RequestType,          // DNS record type (decoded: A, NS, CNAME, PTR, MX, TXT, AAAA, ANY)
          QueryStatus,          // Query status (decoded for 4 documented error values; 0 typically indicates success but is not documented)
          // ▰▰▰[ DNS Response ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IsDnsResponse,        // 1 if the event represents a response, 0 for the query side
          IsSystemResolver,     // 1 if resolved via the macOS system resolver (DNSServiceRef API)
          RespondingDnsServer,  // IP of the DNS server that returned the response
          // ▰▰▰[ DNS Records ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CNAMERecords,         // Semicolon-separated CNAME chain
          IP4Records,           // Semicolon-separated A-record IPv4 addresses
          IP6Records            // Semicolon-separated AAAA-record IPv6 addresses
      ],
      limit=max
  )
