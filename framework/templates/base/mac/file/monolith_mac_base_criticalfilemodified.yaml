name: monolith_mac_base_criticalfilemodified
description: Base query for CriticalFileModified events. Decode transform pending; raw critical-file modification metadata surfaced.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- criticalfilemodified
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=CriticalFileModified event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()         // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()    // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_convert_unix_posix_mode()  // Decodes UnixMode into OwnerPerms / GroupPerms / OtherPerms (rwx-style)
  | $monolith_convert_uid()              // Maps known POSIX UIDs to readable names; falls back to the raw UID
  | $monolith_convert_gid()              // Maps known POSIX GIDs to readable names; falls back to the raw GID

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,         // Human-readable UTC event time (from helper)
          ContextTimeStamp, // Raw event time on host (epoch + ms); no readable conversion yet
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,     // Endpoint hostname
          aid,              // Falcon agent ID; primary host key
          // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserName,         // User who modified the file
          UID,              // Raw POSIX user ID
          UID_readable,     // Decoded POSIX user name (from convert_uid helper)
          GID,              // Raw POSIX group ID
          GID_readable,     // Decoded POSIX group name (from convert_gid helper)
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId, // UPID of the modifying process; joins to ProcessRollup2
          ContextThreadId,  // Thread ID within the modifying process
          TreeId,           // Process tree ID; groups related events
          // ▰▰▰[ File Details ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetFileName,   // Full path of the modified file
          FilePath,         // Directory portion of TargetFileName (parser-derived)
          FileName,         // Basename portion of TargetFileName (parser-derived)
          SourceFileName,   // Staging path used in atomic rename; empty when modification was in-place
          FileIdentifier,   // Sensor-assigned unique file ID
          USN,              // Filesystem update sequence number
          // ▰▰▰[ Permissions ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UnixMode,         // Raw permissions integer (e.g. 384 = 0o600)
          UnixMode_octal,   // Octal form of UnixMode (e.g. "600") (from helper)
          OwnerPerms,       // Owner permissions string (e.g. "rw-") (from helper)
          GroupPerms,       // Group permissions string (from helper)
          OtherPerms        // Other permissions string (from helper)
      ],
      limit=max
  )
