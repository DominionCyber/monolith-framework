name: monolith_mac_base_opendirectorypasswordmodification
description: Base query for OpenDirectoryPasswordModification events. Decodes macOS OpenDirectory password modification activity.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- opendirectorypasswordmodification
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=OpenDirectoryPasswordModification event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()                                  // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()                             // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_opendirectorypasswordmodification()      // Decodes ODErrorCode (63 values) and ODAccountType (USER/COMPUTER)

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                      // Human-readable UTC event time (from helper)
          ContextTimeStamp,              // Raw event time on host (epoch + ms); no readable conversion yet
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,                  // Endpoint hostname
          aid,                           // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,              // UPID of the process performing the password modification; joins to ProcessRollup2
          // ▰▰▰[ Open Directory Operation ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ODNodeName,                    // OD node where the account lives (e.g. /Local/Default for local accounts)
          ODDatabasePath,                // On-disk path to the OD database (e.g. /var/db/dslocal/nodes/Default)
          ODAccountType,                 // Account type having password changed (decoded: ACCOUNT_TYPE_USER or ACCOUNT_TYPE_COMPUTER)
          UserNames,                     // List of usernames whose password was modified (structured JSON)
          AuthenticationUuidsAsStrings,  // Account UUIDs as readable strings (parser-derived friendly form)
          AuthenticationUuids,           // Raw structured JSON wrapper around the UUID list (for parser-fidelity audits)
          ODErrorCode                    // Operation result (decoded: SUCCESS, CREDENTIALS_INVALID, RECORD_PERMISSION_ERROR, ... 63 known values)
      ],
      limit=max
  )
