name: monolith_mac_base_userlogon
description: Base query for UserLogon events. Decodes logon metadata for macOS authentication.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- userlogon
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=UserLogon event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()         // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()    // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_convert_uid()              // Adds UID_readable sibling (root, daemon, ...)
  | $monolith_mac_decode_userlogon()     // Decodes LogonType (12 values), UserLogonFlags (6-bit mask), UserGroupsBitmask (30-bit mask)

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                // Human-readable UTC event time (from helper)
          ContextTimeStamp,        // Raw event time on host (epoch + ms); no readable conversion yet
          LogonTime,               // Epoch timestamp when the logon actually occurred (may differ from ContextTimeStamp)
          PasswordLastSet,         // Epoch timestamp when the account's password was last changed
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,            // Endpoint hostname
          aid,                     // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,        // UPID of the logon-handling process (loginwindow, sshd, etc.)
          RawProcessId,            // OS-level PID; not unique across reboots
          AuditSessionId,          // macOS audit framework session ID (sparse; not always populated)
          // ▰▰▰[ User Identity ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserName,                // OS account name (e.g. joe_hagen)
          UID,                     // POSIX UID (501 = first user; <500 typically system services)
          UID_readable,            // Human-readable UID label (from convert_uid helper)
          UserPrincipal,           // Fully-qualified user principal (UserName@MachineDomain)
          UserSid,                 // Security Identifier in Windows-style format
          UserIsAdmin,             // 1 if local admin; 0 otherwise
          // ▰▰▰[ Authentication & Domain ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          AuthenticationId,        // LUID-like identifier; sentinels: INVALID(0), NETWORK_SERVICE(996), LOCAL_SERVICE(997), SYSTEM(999), RESERVED(1000)
          LogonDomain,             // Domain the user authenticated against (empty on local accounts)
          MachineDomain,           // Domain the machine is joined to (empty on standalone Macs)
          // ▰▰▰[ Logon ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          LogonType,               // Logon mechanism (decoded: INTERACTIVE, NETWORK, REMOTE_INTERACTIVE, UNLOCK, SERVICE, ...)
          RemoteAddressIP4,        // Remote IPv4 of the logon source (populated for NETWORK / REMOTE_INTERACTIVE logons)
          RemoteAddressIP6,        // Remote IPv6 of the logon source (populated for NETWORK / REMOTE_INTERACTIVE logons)
          // ▰▰▰[ Privileges ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserLogonFlags,          // Raw bitmask of logon characteristics
          UserLogonFlags_mask,     // Decoded logon flag names (from helper: USER_IS_ADMIN, USER_IS_LOCAL, ...)
          UserGroupsBitmask,       // Raw bitmask of group memberships
          UserGroupsBitmask_mask   // Decoded group names (from helper: GROUP_BUILTIN_ADMINISTRATOR, ...)
      ],
      limit=max
  )
