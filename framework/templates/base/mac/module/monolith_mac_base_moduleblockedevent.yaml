name: monolith_mac_base_moduleblockedevent
description: 'Base query for ModuleBlockedEvent events on Mac. Surfaces Falcon module-load prevention events with target process and blocked module identity. Each fire indicates the sensor prevented a binary from loading.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- moduleblockedevent
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=ModuleBlockedEvent event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()      // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper() // Decodes Falcon numeric enums/bitfields into readable strings

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,           // Human-readable UTC event time (from helper)
          ContextTimeStamp,   // Raw event time on host (epoch + ms)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,       // Endpoint hostname
          aid,                // Falcon agent ID; primary host key
          // ▰▰▰[ Target Process ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetProcessId,    // UPID of the process whose module load was blocked; joins to ProcessRollup2
          SessionId,          // OS session ID for the target process
          // ▰▰▰[ Blocked Module ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetFileName,     // Full path of the blocked module
          SHA256HashData,     // SHA-256 of the blocked module (sentinel values NOT decoded per framework rule)
          MD5HashData,        // MD5 of the blocked module
          // ▰▰▰[ Correlation ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          EventCorrelationId // Correlation ID linking this block to related detection/blocking events
      ],
      limit=max
  )
