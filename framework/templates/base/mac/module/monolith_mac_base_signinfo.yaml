name: monolith_mac_base_signinfo
description: 'Base query for SignInfo events. Decodes code-signing posture for loaded binaries with signature error state and signing flag bitmasks. NO SAMPLE DATA available at build time.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- signinfo
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=SignInfo event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()      // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper() // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_signinfo()   // Decodes SignatureErrorState (bitmask, 9 flags -> SignatureErrorState_mask), SignInfoFlags (bitmask, 31 flags -> SignInfoFlags_mask) in place

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,         // Human-readable UTC event time (from helper)
          ContextTimeStamp, // Raw event time on host (epoch + ms)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName, // Endpoint hostname
          aid,          // Falcon agent ID; primary host key
          // ▰▰▰[ Module Identity ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          SHA256HashData, // SHA-256 of the signed binary (sentinel values for not-computed NOT decoded per framework rule)
          MD5HashData,    // MD5 of the signed binary
          // ▰▰▰[ Signature Result ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          SignatureErrorState,      // Signature error state (decoded bitmask; 9 error flags)
          SignatureErrorState_mask, // Human-readable error list from helper
          SignInfoFlags,            // Sign info flags (decoded bitmask; 31 flags - )
          SignInfoFlags_mask        // Human-readable sign flag list from helper
      ],
      limit=max
  )
