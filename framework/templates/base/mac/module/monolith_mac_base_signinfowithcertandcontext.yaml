name: monolith_mac_base_signinfowithcertandcontext
description: 'Base query for SignInfoWithCertAndContext events. Decodes code-signing posture with full certificate chain and process context. NO SAMPLE DATA available at build time.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- signinfowithcertandcontext
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=SignInfoWithCertAndContext event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()                      // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()                 // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_signinfowithcertandcontext() // Decodes SignatureErrorState (bitmask, 9 flags -> SignatureErrorState_mask), SignInfoFlags (bitmask, 31 flags -> SignInfoFlags_mask), SignInfoRequestFlags (bitmask, 3 flags -> SignInfoRequestFlags_mask) in place

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,         // Human-readable UTC event time (from helper)
          ContextTimeStamp, // Raw event time on host (epoch + ms)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName, // Endpoint hostname
          aid,          // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,    // UPID of the process loading the signed binary
          ContextThreadId,     // Thread ID
          ContextBaseFileName, // Basename of loading process
          TreeId,              // Process tree ID
          // ▰▰▰[ Module Identity ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          SHA256HashData, // SHA-256 (sentinel values NOT decoded per framework rule)
          MD5HashData,    // MD5 of the signed binary
          // ▰▰▰[ Certificate Chain ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CertIssuerName,   // Issuing CA name (e.g. "Apple Worldwide Developer Relations Certification Authority")
          CertSubjectName,  // Cert subject (the signing identity, e.g. "Developer ID Application: Apple Inc.")
          CertThumbprint,   // Certificate thumbprint (SHA-1 of cert)
          CertSerialNumber, // Cert serial number
          CertPublisher,    // Publisher name from cert
          CertValidFrom,    // Cert validity start (epoch)
          CertValidTo,      // Cert validity end (epoch)
          // ▰▰▰[ Signature Result ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          SignatureErrorState,      // Decoded bitmask; 9 error flags
          SignatureErrorState_mask, // Human-readable error list
          SignInfoFlags,            // Decoded bitmask; 31 flags
          SignInfoFlags_mask,       // Human-readable sign flag list
          SignInfoRequestFlags,     // Request flags bitmask (decoded; 3 flags)
          SignInfoRequestFlags_mask // Human-readable request flag list
      ],
      limit=max
  )
