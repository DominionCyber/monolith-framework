name: monolith_mac_base_networkconnectip6
description: 'Base query for NetworkConnectIP6 events. Decodes outbound and inbound IPv6 socket-connect metadata with full process context and endpoint enrichment.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- networkconnectip6
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=NetworkConnectIP6 event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()             // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()        // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_networkconnectip6() // Decodes Protocol (9 vals), ConnectionDirection (5 vals), ConnectionFlags (5-bit bitmask → ConnectionFlags_mask), TcpConnectErrorCode (9 vals)
  | asn(RemoteAddressIP6)                       // Enriches RemoteAddressIP6 with .asn and .org (link-local fe80::/10 yields no match; expected)
  | ipLocation(RemoteAddressIP6)                // Enriches RemoteAddressIP6 with .country and .city (link-local + ULA addresses yield no match; expected)

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,         // Human-readable UTC event time (from helper)
          ContextTimeStamp, // Raw event time on host (epoch + ms)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName, // Endpoint hostname
          aid,          // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,    // UPID of the process initiating the connection; joins to ProcessRollup2
          ContextThreadId,     // Thread ID within the connecting process
          ContextBaseFileName, // Basename of the connecting process binary (e.g. rapportd, mdnsresponder)
          TreeId,              // Process tree ID; groups related events
          InContext,           // 1 if event emitted in the context of the originating process/thread
          // ▰▰▰[ Container ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          OciContainerId, // OCI container ID if connection originated inside a container (rare on Mac endpoints)
          PodId,          // Kubernetes pod ID (rare on Mac endpoints)
          // ▰▰▰[ Connection ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          Protocol,             // Network protocol (decoded: TCP, UDP, ICMPV6, IPV6, ...)
          ConnectionDirection,  // OUTBOUND / INBOUND / NEITHER / BOTH / UNKNOWN (decoded by helper)
          ConnectionFlags,      // Raw socket bitmask (0 = normal connection)
          ConnectionFlags_mask, // Human-readable bitmask flags (RAW_SOCKET, IS_LOOPBACK, ...) from helper
          CommunityID,          // Zeek-style flow hash (parser-derived); joins flows across sensors and with Zeek/Suricata data
          // ▰▰▰[ Local Endpoint ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          LocalAddressIP6, // Local IPv6 address (link-local fe80::, ULA fd00::/8, or global unicast)
          LocalPort,       // Local TCP/UDP port
          // ▰▰▰[ Remote Endpoint ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          RemoteAddressIP6,    // Remote IPv6 address
          RemotePort,          // Remote TCP/UDP port
          RemoteAddressString, // Optional stringified remote address (often null on IP6; populated for some socket families)
          RemoteAddressIP6.asn,      // Autonomous System Number for RemoteAddressIP6 (from asn enrichment; null for link-local/ULA)
          RemoteAddressIP6.org,      // ASN organization name (from asn enrichment; null for link-local/ULA)
          RemoteAddressIP6.country,  // ISO country code (from ipLocation enrichment; null for link-local/ULA)
          RemoteAddressIP6.city,     // City (from ipLocation enrichment; null for link-local/ULA)
          // ▰▰▰[ ICMP Diagnostics ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IcmpType, // ICMPv6 type (RFC 4443): 1=DestUnreachable, 128=EchoRequest, 129=EchoReply, 135=NeighborSolicitation, 136=NeighborAdvertisement
          IcmpCode, // ICMPv6 code (sub-classification within Type)
          // ▰▰▰[ TCP Diagnostics ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TcpConnectErrorCode // TCP connect outcome (decoded: TCP_CON_SUCCESS, TCP_CON_TIMED_OUT_ERROR, TCP_CON_REFUSED_ERROR, ...; 9 known values; null for UDP/ICMPv6)
      ],
      limit=max
  )
