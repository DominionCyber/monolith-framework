name: monolith_mac_base_networklistenip6
description: 'Base query for NetworkListenIP6 events. Decodes IPv6 socket-listen metadata with full process context and listener endpoint details.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- networklistenip6
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=NetworkListenIP6 event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()            // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()       // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_networklistenip6() // Decodes Protocol (9 vals), ConnectionFlags (bitmask, 5 flags -> ConnectionFlags_mask), ConnectionDirection (5 vals) in place

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,         // Human-readable UTC event time (from helper)
          ContextTimeStamp, // Raw event time on host (epoch + ms)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName, // Endpoint hostname
          aid,          // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId, // UPID of the listening process; joins to ProcessRollup2
          ContextThreadId,  // Thread ID within the listening process
          TreeId,           // Process tree ID; groups related events
          InContext,        // 1 if event emitted in the context of the originating process/thread
          // ▰▰▰[ Container ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          OciContainerId, // OCI container ID if listener originated inside a container (rare on Mac)
          PodId,          // Kubernetes pod ID (rare on Mac)
          // ▰▰▰[ Listener Endpoint ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          LocalAddressIP6, // Local IPv6 address the socket is listening on (:: = all IPv6 interfaces)
          LocalPort,       // Local TCP/UDP port the socket is listening on
          // ▰▰▰[ Peer (for accepted connections) ]▰▰▰▰▰▰▰▰▰▰▰▰
          RemoteAddressIP6,    // Remote IPv6 address of an accepted peer (may be null for new listen)
          RemotePort,          // Remote TCP/UDP port of an accepted peer (may be null)
          RemoteAddressString, // Stringified remote address (optional)
          // ▰▰▰[ Flow Characteristics ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          Protocol,            // Network protocol (decoded: TCP, UDP, ICMPV6, ...)
          ConnectionDirection, // OUTBOUND / INBOUND / NEITHER / BOTH / UNKNOWN (decoded)
          ConnectionFlags,     // Raw socket bitmask (0 = normal connection)
          ConnectionFlags_mask // Human-readable bitmask flags (RAW_SOCKET, IS_LOOPBACK, ...) from helper
      ],
      limit=max
  )
