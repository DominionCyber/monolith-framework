name: monolith_mac_base_processsubstituteuser
description: Base query for ProcessSubstituteUser events. Decode transform pending; raw user-substitution metadata surfaced.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- processsubstituteuser
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=ProcessSubstituteUser event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()       // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()  // Decodes Falcon numeric enums/bitfields into readable strings

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                    // Human-readable UTC event time (from helper)
          ContextTimeStamp,            // Raw event time on host (epoch + ms); no readable conversion yet
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,                // Endpoint hostname
          aid,                         // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,            // UPID of the process that invoked su; joins to ProcessRollup2
          // ▰▰▰[ Substitute User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          OriginalUserName,            // Username of the session BEFORE su (the actor)
          OriginalUserID,              // UID of the session BEFORE su
          NewUsername,                 // Username being switched TO (note schema lowercase 'n' in 'name')
          NewUserID,                   // UID being switched TO; UID 0 = attempted root escalation
          // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ExecutionShell,              // Shell the new session would launch (e.g. /bin/zsh, /bin/bash)
          CommandLine,                 // Full command line of the su invocation (e.g. "su - admin")
          EnvironmentVariablesString,  // Environment variables at su time (space-separated KEY=VALUE)
          // ▰▰▰[ Result ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          OriginalErrorMessage         // Empty on success; populated with PAM/su error on failure (e.g. "pam_chauthtok: conversation failure")
      ],
      limit=max
  )
