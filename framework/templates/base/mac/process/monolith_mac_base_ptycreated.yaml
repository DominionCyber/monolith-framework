name: monolith_mac_base_ptycreated
description: Base query for PtyCreated events. Decode transform pending; raw PTY-creation metadata surfaced.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- base
- ptycreated
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  #event_simpleName=PtyCreated event_platform=Mac

  // ▰▰▰▰▰▰[ SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | $monolith_convert_time_utc()         // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()    // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_convert_file_extension()   // Parses FileName into FileExtension; "(none)" if absent (most shells/binaries have no extension)

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,          // Human-readable UTC event time (from helper)
          ContextTimeStamp,  // Raw event time on host (epoch + ms); no readable conversion yet
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,      // Endpoint hostname
          aid,               // Falcon agent ID; primary host key
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextProcessId,  // UPID of the process that created the PTY; joins to ProcessRollup2 for the actor
          ContextThreadId,   // UTID of the creating thread; commonly 0 (sentinel) for kernel-level PTY events
          TreeId,            // Process tree ID; groups related events
          // ▰▰▰[ PTY ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          DeviceId,          // PTY device identifier (numeric); maps to /dev/ttysNNN on the host
          // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ImageFileName,     // Full path of the binary that allocated the PTY
          FilePath,          // Directory portion (parser-derived)
          FileName,          // Basename portion (parser-derived)
          FileExtension,     // Last extension of FileName (from helper); "(none)" for most shells/binaries
          // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CommandLine        // Full command line of the PTY-creating process (may be empty or truncated per dictionary)
      ],
      limit=max
  )
