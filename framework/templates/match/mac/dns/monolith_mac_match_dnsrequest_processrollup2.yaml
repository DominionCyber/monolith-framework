name: monolith_mac_match_dnsrequest_processrollup2
description: Joins ProcessRollup2 events with DnsRequest events, surfacing process telemetry enriched with the DNS context generated by each process. The match key is the process UPID (TargetProcessId on PR2 = falconPID on DnsRequest, derived from ContextProcessId).
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- match
- dnsrequest
- processrollup2
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ L1 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Builds a lookup table of DnsRequest events on Mac, keyed by falconPID (the process that made the DNS request)
  defineTable(
      query={
        #event_simpleName=DnsRequest event_platform=Mac
        | $monolith_utility_falcon_pid()        // Translates ContextProcessId into falconPID (the match key for non-PR2 events)
        | $monolith_mac_decode_dnsrequest()     // Decodes RequestType (A/AAAA/MX/...) and QueryStatus enum values
      },
      name=dns_connections,
      include=[
          // ▰▰▰[ Match Key ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          falconPID,             // Derived from ContextProcessId by the falcon_pid helper; joins to PR2.TargetProcessId
          // ▰▰▰[ DNS Query ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          DomainName,            // Full FQDN queried (e.g. mail.google.com)
          BaseDomainName,        // PSL-aware base domain (e.g. google.com); Mac-specific sensor-side derivation
          RequestType,           // DNS query type (decoded: A, AAAA, MX, CNAME, PTR, TXT, ...)
          QueryStatus,           // Query result code (decoded: NOERROR, NXDOMAIN, SERVFAIL, ...)
          // ▰▰▰[ DNS Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IsDnsResponse,         // 0 = query event; 1 = response event
          IsSystemResolver,      // 1 = system resolver (mDNSResponder); 0 = app resolver (browser, custom DNS)
          // ▰▰▰[ DNS Records ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IP4Records,            // Semicolon-separated list of resolved IPv4 addresses
          IP6Records,            // Semicolon-separated list of resolved IPv6 addresses
          CNAMERecords,          // Chain of CNAME records if domain resolves via aliases
          RespondingDnsServer    // IP address of the DNS server that returned the response
      ]
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Pulls ProcessRollup2 events to be enriched with the DNS context from L1 (exact match anchor; excludes SyntheticPR2 and PR2Stats)
  | #event_simpleName=ProcessRollup2 event_platform=Mac

  // ▰▰▰▰▰▰[ MATCH STATEMENT ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Inner join: keep only PR2 events whose TargetProcessId matches a falconPID in the dns_connections table
  | match(
      table=dns_connections,
      field=TargetProcessId,                  // PR2-side UPID (the process the event describes)
      column=falconPID                        // DnsRequest-side UPID (derived from ContextProcessId by helper)
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Enrichment for the L2 ProcessRollup2 side (applied after the match so DNS fields are also in scope)
  | $monolith_convert_time_utc()              // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()         // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_convert_file_extension()        // Parses FileName into FileExtension; "(none)" if absent
  | $monolith_convert_uid()                   // Adds UID_readable sibling (root, daemon, ...)
  | $monolith_convert_gid()                   // Adds GID_readable sibling
  | $monolith_mac_decode_processrollup2()     // Decodes MachOSubType, CodeSigningFlags (PR2-specific enum/bitmask)

  // ▰▰▰▰▰▰[ GROUP BY LOGIC ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Collapses many (PR2 + DNS) joined rows into one row per (host, process binary, domain) tuple; each output row carries the full collected context
  | groupBy(
      [
          aid,                  // Falcon agent ID; uniquely identifies the host
          SHA256HashData,       // PR2 binary hash; uniquely identifies the executing image
          DomainName            // DNS pivot; one row per queried FQDN per binary per host
      ],
      function=[
          collect([
              // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              utc_time,                  // Human-readable UTC event time (from helper)
              // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ComputerName,              // Endpoint hostname
              // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              UserName,                  // OS account that owns the process
              UID,                       // Effective UID
              UID_readable,              // Human-readable UID label (from helper)
              GID,                       // Effective GID
              GID_readable,              // Human-readable GID label (from helper)
              // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              TargetProcessId,           // UPID of the PR2 process; same as the match key
              RawProcessId,              // OS-level PID
              ParentBaseFileName,        // Basename of the parent binary (e.g. launchd, bash)
              ContextBaseFileName,       // Basename of the process binary (PR2-side; authoritative for the actor)
              // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              FilePath,                  // Directory portion of ImageFileName (parser-derived)
              FileName,                  // Basename portion of ImageFileName (parser-derived)
              FileExtension,             // Last extension of FileName (from helper); "(none)" for most binaries
              SHA256HashData,            // SHA-256 of the process binary
              // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              CommandLine,               // Full command line of the process (may be empty or truncated)
              // ▰▰▰[ DNS Query ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              DomainName,                // Full FQDN queried (from L1)
              BaseDomainName,            // PSL-aware base domain (from L1)
              RequestType,               // DNS query type (decoded; from L1)
              QueryStatus,               // Query result code (decoded; from L1)
              // ▰▰▰[ DNS Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              IsDnsResponse,             // 0 = query, 1 = response (from L1)
              IsSystemResolver,          // 1 = system resolver, 0 = app resolver (from L1)
              // ▰▰▰[ DNS Records ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              IP4Records,                // Semicolon-separated IPv4 results (from L1)
              IP6Records,                // Semicolon-separated IPv6 results (from L1)
              CNAMERecords,              // CNAME chain (from L1)
              RespondingDnsServer        // DNS server that answered (from L1)
          ])
      ],
      limit=max
  )

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Final analyst view: one row per (host, binary, domain) with collected context arranged for triage
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,              // Human-readable UTC event time
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,          // Endpoint hostname
          // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserName,              // OS account that owns the process
          UID,                   // Effective UID
          UID_readable,          // Human-readable UID label
          GID,                   // Effective GID
          GID_readable,          // Human-readable GID label
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetProcessId,       // UPID of the process (joins downstream)
          RawProcessId,          // OS-level PID
          ParentBaseFileName,    // Basename of the parent binary
          ContextBaseFileName,   // Basename of the process binary (the actor)
          // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          FilePath,              // Directory portion of the binary path
          FileName,               // Basename of the binary
          FileExtension,         // Last extension; "(none)" for most binaries
          SHA256HashData,        // SHA-256 of the process binary
          // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CommandLine,           // Full command line of the process
          // ▰▰▰[ DNS Query ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          DomainName,            // Full FQDN queried
          BaseDomainName,        // PSL-aware base domain (e.g. google.com from mail.google.com)
          RequestType,           // DNS query type (decoded)
          QueryStatus,           // Query result code (decoded)
          // ▰▰▰[ DNS Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IsDnsResponse,         // 0 = query, 1 = response
          IsSystemResolver,      // 1 = system resolver (mDNSResponder), 0 = app resolver
          // ▰▰▰[ DNS Records ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          IP4Records,            // Semicolon-separated IPv4 results
          IP6Records,            // Semicolon-separated IPv6 results
          CNAMERecords,          // CNAME chain (if applicable)
          RespondingDnsServer    // DNS server that answered the query
      ],
      limit=max
  )
