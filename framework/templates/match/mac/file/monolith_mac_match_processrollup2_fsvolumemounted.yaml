name: monolith_mac_match_processrollup2_fsvolumemounted
description: Joins FsVolumeMounted events with ProcessRollup2 events, surfacing volume mounts (.dmg, USB, network shares, snapshots) enriched with the responsible process context.
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- match
- processrollup2
- fsvolumemounted
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ L1 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Builds a lookup table of ProcessRollup2 events on Mac, keyed by TargetProcessId (the process the event describes)
  defineTable(
      query={
        #event_simpleName=ProcessRollup2 event_platform=Mac
        | $monolith_convert_file_extension()    // Parses FileName into FileExtension before extraction
        | $monolith_convert_uid()               // Adds UID_readable sibling before extraction
        | $monolith_convert_gid()               // Adds GID_readable sibling before extraction
        | $monolith_mac_decode_processrollup2() // Decodes MachOSubType (8 vals) and CodeSigningFlags (27-bit mask)
      },
      name=processes,
      include=[
          // ▰▰▰[ Match Key ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetProcessId,         // UPID of the process; joins to FsVolumeMounted.falconPID
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,            // Endpoint hostname (envelope; same on both events)
          // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserName,                // OS account that owns the writing process
          UID,                     // Effective UID
          UID_readable,            // Human-readable UID label (from convert_uid helper)
          GID,                     // Effective GID
          GID_readable,            // Human-readable GID label (from convert_gid helper)
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ParentBaseFileName,      // Basename of the parent binary
          ContextBaseFileName,     // Basename of the actor process binary
          RawProcessId,            // OS-level PID of the writing process
          // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          FilePath,                // Directory portion of the process binary path (from ImageFileName parser)
          FileName,                // Basename of the process binary
          FileExtension,           // Last extension of the process binary; "(none)" for most binaries
          SHA256HashData,          // SHA-256 of the process binary
          // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CommandLine              // Full command line of the actor process
      ]
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Pulls FsVolumeMounted events to be enriched with process context from L1
  | #event_simpleName=FsVolumeMounted event_platform=Mac
  | $monolith_utility_falcon_pid()              // Translates ContextProcessId into falconPID (this event lacks TargetProcessId natively)

  // ▰▰▰▰▰▰[ MATCH STATEMENT ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Inner join: keep only L2 events whose falconPID matches a TargetProcessId in the processes table
  | match(
      table=processes,
      field=falconPID,                          // L2-side UPID (derived from ContextProcessId by helper)
      column=TargetProcessId                    // L1-side UPID (PR2's TargetProcessId)
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Enrichment for the L2 side (applied after the match so PR2 fields are also in scope)
  | $monolith_convert_time_utc()                // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()           // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_mac_decode_fsvolumemounted()        // Event-specific enum/bitmask decoder

  // ▰▰▰▰▰▰[ GROUP BY LOGIC ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Collapses many joined rows into one row per group key, with all related fields collected
  | groupBy(
      [
          aid,                         // Falcon agent ID; uniquely identifies the host
          VolumeUUID,                  // Volume's unique identifier
          VolumeMountPoint             // Where the volume was mounted
      ],
      function=[
          collect([
              // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              utc_time,                    // Human-readable UTC event time (from helper)
              // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ComputerName,                // Endpoint hostname (from L1)
              // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              UserName,                    // OS account owning the actor process (from L1)
              UID,                         // Effective UID (from L1)
              UID_readable,                // Human-readable UID (from L1 helper)
              GID,                         // Effective GID (from L1)
              GID_readable,                // Human-readable GID (from L1 helper)
              // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              TargetProcessId,             // UPID of the actor process (from L1)
              RawProcessId,                // OS-level PID (from L1)
              ParentBaseFileName,          // Basename of the parent binary (from L1)
              ContextBaseFileName,         // Basename of the actor process binary (from L1)
              // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              FilePath,                    // Directory of the actor process binary (from L1)
              FileName,                    // Basename of the actor process binary (from L1)
              FileExtension,               // Extension of the actor process binary (from L1)
              SHA256HashData,              // SHA-256 of the actor process binary (from L1)
              // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              CommandLine,                 // Full command line of the actor process (from L1)
              // ▰▰▰[ Time (L2) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ContextTimeStamp,            // Raw event time on host
              VolumeAppearanceTime,        // When the volume first appeared to the system
              // ▰▰▰[ Volume Identity ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              VolumeName,                  // Friendly volume name
              VolumeUUID,                  // Volume's persistent UUID
              VolumeSessionUUID,           // Per-mount session correlation
              VolumeMountPoint,            // Where the volume was mounted (e.g. /Volumes/Foo)
              VolumeOriginPath,            // Source path the volume came from (e.g. .dmg path)
              VolumeType,                  // Volume type (decoded)
              VolumeMountDisposition,      // Mount disposition (decoded)
              // ▰▰▰[ Volume Properties ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              VolumeIsNetwork,             // 1 = network share; 0 = local
              VolumeIsBackupDestination,   // Time Machine destination flag
              VolumeIsHidden,              // Hidden volume flag
              VolumeFileSystemDriver,      // FS driver (APFS, HFS+, exFAT, ...)
              VolumeMediaSize,             // Volume size in bytes
              VolumeMediaRemovable,        // Removable media flag
              VolumeMediaWritable,         // Writable flag
              VolumeMediaEjectable,        // Ejectable flag
              // ▰▰▰[ Media Device ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              VolumeMediaName,             // Media device name
              VolumeMediaContent,          // Media content type
              VolumeMediaUUID,             // Media-level UUID
              VolumeMediaPath,             // Full media path
              VolumeMediaBSDName,          // BSD device name (e.g. disk2s1)
              VolumeMediaWhole,            // Whole-disk flag
              VolumeSectorSize,            // Sector size in bytes
              // ▰▰▰[ Bus / Device ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              VolumeBusName,               // Bus name (USB, Thunderbolt, ...)
              VolumeBusPath,               // Bus path
              VolumeDeviceVendor,          // Device vendor name
              VolumeDeviceModel,           // Device model name
              VolumeDeviceRevision,        // Device firmware revision
              VolumeDeviceProtocol,        // Bus protocol
              VolumeDevicePath,            // Device path
              VolumeDeviceInternal,        // 1 = internal; 0 = external
              DiskParentDeviceInstanceId   // Physical parent device identifier
          ])
      ],
      limit=max
  )

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Final analyst view: one row per group key with full collected context for triage
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                    // Human-readable UTC event time (from helper)
          // ▰▰▰[ Host ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ComputerName,                // Endpoint hostname (from L1)
          // ▰▰▰[ User ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          UserName,                    // OS account owning the actor process (from L1)
          UID,                         // Effective UID (from L1)
          UID_readable,                // Human-readable UID (from L1 helper)
          GID,                         // Effective GID (from L1)
          GID_readable,                // Human-readable GID (from L1 helper)
          // ▰▰▰[ Process Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          TargetProcessId,             // UPID of the actor process (from L1)
          RawProcessId,                // OS-level PID (from L1)
          ParentBaseFileName,          // Basename of the parent binary (from L1)
          ContextBaseFileName,         // Basename of the actor process binary (from L1)
          // ▰▰▰[ Process Binary ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          FilePath,                    // Directory of the actor process binary (from L1)
          FileName,                    // Basename of the actor process binary (from L1)
          FileExtension,               // Extension of the actor process binary (from L1)
          SHA256HashData,              // SHA-256 of the actor process binary (from L1)
          // ▰▰▰[ Execution ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          CommandLine,                 // Full command line of the actor process (from L1)
          // ▰▰▰[ Time (L2) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextTimeStamp,            // Raw event time on host
          VolumeAppearanceTime,        // When the volume first appeared to the system
          // ▰▰▰[ Volume Identity ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          VolumeName,                  // Friendly volume name
          VolumeUUID,                  // Volume's persistent UUID
          VolumeSessionUUID,           // Per-mount session correlation
          VolumeMountPoint,            // Where the volume was mounted (e.g. /Volumes/Foo)
          VolumeOriginPath,            // Source path the volume came from (e.g. .dmg path)
          VolumeType,                  // Volume type (decoded)
          VolumeMountDisposition,      // Mount disposition (decoded)
          // ▰▰▰[ Volume Properties ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          VolumeIsNetwork,             // 1 = network share; 0 = local
          VolumeIsBackupDestination,   // Time Machine destination flag
          VolumeIsHidden,              // Hidden volume flag
          VolumeFileSystemDriver,      // FS driver (APFS, HFS+, exFAT, ...)
          VolumeMediaSize,             // Volume size in bytes
          VolumeMediaRemovable,        // Removable media flag
          VolumeMediaWritable,         // Writable flag
          VolumeMediaEjectable,        // Ejectable flag
          // ▰▰▰[ Media Device ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          VolumeMediaName,             // Media device name
          VolumeMediaContent,          // Media content type
          VolumeMediaUUID,             // Media-level UUID
          VolumeMediaPath,             // Full media path
          VolumeMediaBSDName,          // BSD device name (e.g. disk2s1)
          VolumeMediaWhole,            // Whole-disk flag
          VolumeSectorSize,            // Sector size in bytes
          // ▰▰▰[ Bus / Device ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          VolumeBusName,               // Bus name (USB, Thunderbolt, ...)
          VolumeBusPath,               // Bus path
          VolumeDeviceVendor,          // Device vendor name
          VolumeDeviceModel,           // Device model name
          VolumeDeviceRevision,        // Device firmware revision
          VolumeDeviceProtocol,        // Bus protocol
          VolumeDevicePath,            // Device path
          VolumeDeviceInternal,        // 1 = internal; 0 = external
          DiskParentDeviceInstanceId   // Physical parent device identifier
      ],
      limit=max
  )
