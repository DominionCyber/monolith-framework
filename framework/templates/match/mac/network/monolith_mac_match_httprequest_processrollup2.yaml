name: monolith_mac_match_httprequest_processrollup2
description: 'Inverse of processrollup2_httprequest. L1 = HttpRequest events (defineTable on falconPID), L2 = ProcessRollup2. PERFORMANCE: prefer this direction when filtering on specific HTTP attributes (HttpHost, HttpPath, HttpUserAgent) so the request set is small.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- match
- httprequest
- processrollup2
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ L1 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Builds a lookup table of HttpRequest events on Mac, keyed by falconPID
  // PERFORMANCE: prefer this direction when HttpRequest is the narrow side (specific filter applied)
  defineTable(
      query={
        #event_simpleName=HttpRequest event_platform=Mac
        | $monolith_utility_falcon_pid()        // Translates ContextProcessId into falconPID (the L1 join key)
        | asn(EffectiveRemoteAddressIP4)    // Adds ASN org/country
        | ipLocation(EffectiveRemoteAddressIP4)    // Adds geolocation data
        | $monolith_mac_decode_httprequest()    // Event-specific enum/bitmask decoder
      },
      name=http_requests,
      include=[
          EffectiveRemoteAddressIP4,  // Effective remote IPv4 (post-proxy)
          EffectiveRemotePort,  // Effective remote port
          EffectiveDomainName,  // Effective target hostname
          DomainName,  // Domain header from request
          HttpMethod,  // HTTP method (decoded)
          HttpHost,  // Host header value
          HttpPath,  // Request URI path
          HttpUserAgent,  // User-Agent header
          HttpExchangeIndex,  // Sequential index for req/resp pairing
          falconPID  // L1 match key (derived from ContextProcessId)
      ]
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Pulls ProcessRollup2 events on Mac to surface the actor process for each L1 event
  | #event_simpleName=ProcessRollup2 event_platform=Mac
  | $monolith_convert_uid()                     // Adds UID_readable sibling
  | $monolith_convert_gid()                     // Adds GID_readable sibling
  | $monolith_mac_decode_processrollup2()       // Decodes MachOSubType and CodeSigningFlags

  // ▰▰▰▰▰▰[ MATCH STATEMENT ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Inner join: keep only PR2 records whose TargetProcessId matches an L1 falconPID
  | match(
      table=http_requests,
      field=TargetProcessId,                    // L2-side UPID (PR2's process ID)
      column=falconPID                          // L1-side UPID
  )

  // ▰▰▰▰▰▰[ L2 ENRICHMENT ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // After the match, both sides are in scope
  | $monolith_convert_time_utc()                // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()           // Decodes Falcon numeric enums/bitfields into readable strings

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // One row per L1 event with the responsible process context attached
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                    // Human-readable UTC event time
          ContextTimeStamp,            // Raw event time on host
          // ▰▰▰[ Actor Process (from L2 PR2) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ComputerName,                // Endpoint hostname
              UserName,                    // OS account (process owner)
              UID,                         // Effective UID
              UID_readable,                // Human-readable UID
              GID,                         // Effective GID
              GID_readable,                // Human-readable GID
              TargetProcessId,             // UPID of the actor process
              RawProcessId,                // OS-level PID
              ParentBaseFileName,          // Basename of the parent binary
              ContextBaseFileName,         // Basename of the actor process
              ImageFileName,               // Full path of the actor process binary
              SHA256HashData,              // SHA-256 of the actor process binary
              CommandLine                  // Full command line of the actor process,
          // ▰▰▰[ L1 Event Context ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          EffectiveRemoteAddressIP4,    // Effective remote IPv4 (post-proxy)
          EffectiveRemotePort,    // Effective remote port
          EffectiveDomainName,    // Effective target hostname
          DomainName,    // Domain header from request
          HttpMethod,    // HTTP method (decoded)
          HttpHost,    // Host header value
          HttpPath,    // Request URI path
          HttpUserAgent,    // User-Agent header
          HttpExchangeIndex,    // Sequential index for req/resp pairing
          falconPID                    // L1 join key (process UPID)
      ],
      limit=max
  )
