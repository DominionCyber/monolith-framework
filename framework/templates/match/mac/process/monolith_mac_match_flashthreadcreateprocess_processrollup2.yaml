name: monolith_mac_match_flashthreadcreateprocess_processrollup2
description: "'Joins ProcessRollup2 events with FlashThreadCreateProcess events, surfacing Flash/Adobe-specific thread-create activity with the responsible process context. NOTE: this event is mostly legacy (Flash EOL) and may not fire in modern macOS fleets.'"
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- match
- flashthreadcreateprocess
- processrollup2
- mac
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ L1 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Builds a lookup table of FlashThreadCreateProcess events on Mac, keyed by falconPID (the process that performed the event)
  defineTable(
      query={
        #event_simpleName=FlashThreadCreateProcess event_platform=Mac
        | $monolith_utility_falcon_pid()        // Translates ContextProcessId into falconPID (the match key for non-PR2 events)
      },
      name=flash_thread_creates,
      include=[
          // ▰▰▰[ Match Key ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          falconPID,           // Derived from ContextProcessId by the falcon_pid helper; joins to PR2.TargetProcessId
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          ContextTimeStamp,    // Raw event time on host
          // ▰▰▰[ Event-specific (from L1) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ThreadId,        // New thread ID
              ContextThreadId  // Thread within the creator
      ]
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Pulls ProcessRollup2 events to be enriched with event context from L1 (exact match anchor; excludes SyntheticPR2 and PR2Stats)
  | #event_simpleName=ProcessRollup2 event_platform=Mac

  // ▰▰▰▰▰▰[ MATCH STATEMENT ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Inner join: keep only PR2 events whose TargetProcessId matches a falconPID in the flash_thread_creates table
  | match(
      table=flash_thread_creates,
      field=TargetProcessId,                  // PR2-side UPID (the process the event describes)
      column=falconPID                        // L1-side UPID (derived from ContextProcessId by helper on the event side)
  )

  // ▰▰▰▰▰▰[ L2 SEARCH ASSETS ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Enrichment for the L2 ProcessRollup2 side (applied after the match so event fields are also in scope)
  | $monolith_convert_time_utc()              // Formats `timestamp` into human-readable UTC (utc_time)
  | $monolith_utility_falcon_helper()         // Decodes Falcon numeric enums/bitfields into readable strings
  | $monolith_convert_file_extension()        // Parses FileName into FileExtension; "(none)" if absent
  | $monolith_convert_uid()                   // Adds UID_readable sibling (root, daemon, ...)
  | $monolith_convert_gid()                   // Adds GID_readable sibling
  | $monolith_mac_decode_processrollup2()     // Decodes MachOSubType, CodeSigningFlags (PR2-specific enum/bitmask)

  // ▰▰▰▰▰▰[ GROUP BY LOGIC ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Collapses many joined rows into one row per (host, process binary) tuple with full collected context
  | groupBy(
      [
          aid,             // Falcon agent ID; uniquely identifies the host
          SHA256HashData,  // PR2 binary hash; uniquely identifies the executing image
      ],
      function=[
          collect([
          ])
      ],
      limit=max
  )

  // ▰▰▰▰▰▰[ TABLE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // Final analyst view: one row per group key with collected context arranged for triage
  | table(
      [
          // ▰▰▰[ Time ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
          utc_time,                 // Human-readable UTC event time
          ContextTimeStamp,         // Raw event time on host
          // ▰▰▰[ Actor Process (from L1 PR2) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              ComputerName,         // Endpoint hostname
              UserName,             // OS account (process owner)
              UID,                  // Effective UID
              UID_readable,         // Human-readable UID
              GID,                  // Effective GID
              GID_readable,         // Human-readable GID
              TargetProcessId,      // UPID of the actor process
              RawProcessId,         // OS-level PID
              ParentBaseFileName,   // Basename of the parent binary
              ContextBaseFileName,  // Basename of the actor process
              ImageFileName,        // Full path of the actor process binary
              SHA256HashData,       // SHA-256 of the actor process binary
              CommandLine           // Full command line of the actor process,
          // ▰▰▰[ Event-specific (from L1) ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
              TargetProcessId,      // L2-side: NOTE this is the TARGET process being created
              ThreadId,             // New thread ID
              ContextThreadId       // Thread within the creator
      ],
      limit=max
  )
