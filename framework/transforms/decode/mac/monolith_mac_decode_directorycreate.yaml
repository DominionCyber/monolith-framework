name: monolith_mac_decode_directorycreate
description: Decodes event fields using conditional logic to standardize values across different event sources.
visualization:
  options:
    columns:
    - fieldName: '@timestamp'
      format: datetime
      type: field
      width: 200
    - groupByPrefix: false
      header: Field List
      type: fieldList
    newestAtBottom: true
    showOnlyFirstLine: false
  type: list-view
labels:
- monolith_hunt_framework
- asset
- decode
- directorycreate
- macos
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ DECODE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // case {}: enum decoder for VnodeType (11 value branches; final `*` is the fallthrough)
  | case {
      VnodeType = "0"  | VnodeType := "VNON";
      VnodeType = "1"  | VnodeType := "VREG";
      VnodeType = "2"  | VnodeType := "VDIR";
      VnodeType = "3"  | VnodeType := "VBLK";
      VnodeType = "4"  | VnodeType := "VCHR";
      VnodeType = "5"  | VnodeType := "VLNK";
      VnodeType = "6"  | VnodeType := "VSOCK";
      VnodeType = "7"  | VnodeType := "VFIFO";
      VnodeType = "8"  | VnodeType := "VBAD";
      VnodeType = "9"  | VnodeType := "VSTR";
      VnodeType = "10" | VnodeType := "VCPLX";
      *
  }
