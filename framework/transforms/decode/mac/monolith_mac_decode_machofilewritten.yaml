name: monolith_mac_decode_machofilewritten
description: Decodes the FileCategory enum (11 values) and the MachOSubType enum (8 values) into readable strings in place.
visualization:
  options:
    columns:
    - fieldName: '@timestamp'
      format: datetime
      type: field
      width: 200
    - groupByPrefix: false
      header: Field List
      type: fieldList
    newestAtBottom: true
    showOnlyFirstLine: false
  type: list-view
labels:
- monolith_hunt_framework
- asset
- decode
- machofilewritten
- macos
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ DECODE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // case {}: enum decoder for FileCategory (11 value branches; final `*` is the fallthrough)
  | case {
    FileCategory = "0"  | FileCategory := "OTHER";
    FileCategory = "1"  | FileCategory := "ARCHIVES";
    FileCategory = "2"  | FileCategory := "OFFICE_DOCUMENTS";
    FileCategory = "3"  | FileCategory := "MULTIMEDIA_FILES";
    FileCategory = "4"  | FileCategory := "DESIGN_FILES";
    FileCategory = "5"  | FileCategory := "SOURCE_CODE";
    FileCategory = "6"  | FileCategory := "EXECUTABLE_FILES";
    FileCategory = "7"  | FileCategory := "VIRTUAL_MACHINE_FILES";
    FileCategory = "8"  | FileCategory := "EMAIL_FILES";
    FileCategory = "9"  | FileCategory := "DATA_AND_LOGS";
    FileCategory = "10" | FileCategory := "ENCRYPTED";
    *
  }

  // case {}: enum decoder for MachOSubType (8 value branches; final `*` is the fallthrough)
  | case {
    MachOSubType = "0" | MachOSubType := "UNKNOWN";
    MachOSubType = "1" | MachOSubType := "EXECUTABLE64";
    MachOSubType = "2" | MachOSubType := "DYLIB64";
    MachOSubType = "3" | MachOSubType := "BUNDLE64";
    MachOSubType = "4" | MachOSubType := "KEXT64";
    MachOSubType = "5" | MachOSubType := "EXECUTABLE32";
    MachOSubType = "6" | MachOSubType := "DYLIB32";
    MachOSubType = "7" | MachOSubType := "BUNDLE32";
    *
  }
