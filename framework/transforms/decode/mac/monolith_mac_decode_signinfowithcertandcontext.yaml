name: monolith_mac_decode_signinfowithcertandcontext
description: 'Decodes SignatureErrorState (9-flag bitmask), SignInfoFlags (31-flag bitmask), and SignInfoRequestFlags (3-flag bitmask) on SignInfoWithCertAndContext events.'
visualization:
  options:
    cell-overflow: wrap-text
    column-overflow: truncate
    configured-columns: {}
    row-numbers-enabled: false
  type: table-view
labels:
- monolith_hunt_framework
- asset
- decode
- signinfowithcertandcontext
- macos
$schema: https://schemas.humio.com/query/v0.6.0
timeInterval:
  isLive: false
  start: 15m
queryString: |-
  // ▰▰▰▰▰▰[ DECODE ]▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰▰
  // bitfield:extractFlagsAsString(): expands SignatureErrorState (8 flags) into the new field SignatureErrorState_mask
  | bitfield:extractFlagsAsString(
      field="SignatureErrorState",
      flagNames=[
          [0, "MINCRYPT_POLICY_NO_SIGNATURE"],
          [1, "MINCRYPT_POLICY_BAD_CHAIN"],
          [2, "MINCRYPT_POLICY_BAD_SIGNATURE"],
          [3, "MINCRYPT_POLICY_NO_CODE_EKU"],
          [4, "MINCRYPT_POLICY_NO_PAGE_HASHES"],
          [5, "MINCRYPT_POLICY_CERT_REVOKED"],
          [6, "MINCRYPT_POLICY_CERT_EXPIRED"],
          [12, "MINCRYPT_POLICY_UNKNOWN_ERROR"]
      ],
      as="SignatureErrorState_mask",
      separator=", "
  )

  // bitfield:extractFlagsAsString(): expands SignInfoFlags (31 flags) into the new field SignInfoFlags_mask
  | bitfield:extractFlagsAsString(
      field="SignInfoFlags",
      flagNames=[
          [0, "SIGNATURE_FLAG_SELF_SIGNED"],
          [1, "SIGNATURE_FLAG_MS_SIGNED"],
          [2, "SIGNATURE_FLAG_TEST_SIGNED"],
          [3, "SIGNATURE_FLAG_MS_CROSS_SIGNED"],
          [4, "SIGNATURE_FLAG_CAT_SIGNED"],
          [5, "SIGNATURE_FLAG_DRM_SIGNED"],
          [6, "SIGNATURE_FLAG_DRM_TEST_SIGNED"],
          [7, "SIGNATURE_FLAG_MS_CAT_SIGNED"],
          [8, "SIGNATURE_FLAG_CATALOGS_RELOADED"],
          [9, "SIGNATURE_FLAG_NO_SIGNATURE"],
          [10, "SIGNATURE_FLAG_INVALID_SIGN_CHAIN"],
          [11, "SIGNATURE_FLAG_SIGN_HASH_MISMATCH"],
          [12, "SIGNATURE_FLAG_NO_CODE_KEY_USAGE"],
          [13, "SIGNATURE_FLAG_NO_PAGE_HASHES"],
          [14, "SIGNATURE_FLAG_FAILED_CERT_CHECK"],
          [15, "SIGNATURE_FLAG_NO_EMBEDDED_CERT"],
          [16, "SIGNATURE_FLAG_FAILED_COPY_KEYS"],
          [17, "SIGNATURE_FLAG_UNKNOWN_ERROR"],
          [18, "SIGNATURE_FLAG_HAS_VALID_SIGNATURE"],
          [19, "SIGNATURE_FLAG_EMBEDDED_SIGNED"],
          [20, "SIGNATURE_FLAG_3RD_PARTY_ROOT"],
          [21, "SIGNATURE_FLAG_TRUSTED_BOOT_ROOT"],
          [22, "SIGNATURE_FLAG_UEFI_ROOT"],
          [23, "SIGNATURE_FLAG_PRS_WIN81_ROOT"],
          [24, "SIGNATURE_FLAG_FLIGHT_ROOT"],
          [25, "SIGNATURE_FLAG_APPLE_SIGNED"],
          [26, "SIGNATURE_FLAG_ESBCACHE"],
          [27, "SIGNATURE_FLAG_NO_CACHED_DATA"],
          [28, "SIGNATURE_FLAG_CERT_EXPIRED"],
          [29, "SIGNATURE_FLAG_CERT_REVOKED"],
          [30, "SIGNATURE_FLAG_MS_ISSUED_3RD_PARTY"]
      ],
      as="SignInfoFlags_mask",
      separator=", "
  )

  // bitfield:extractFlagsAsString(): expands SignInfoRequestFlags (3 flags) into the new field SignInfoRequestFlags_mask
  | bitfield:extractFlagsAsString(
      field="SignInfoRequestFlags",
      flagNames=[
          [0, "RESET_SIGNINFO_CLOUDED_TIMESTAMP"],
          [1, "RESPONSE_EA_CACHE_NOT_WRITTEN"],
          [2, "RESPONSE_AUTHENTICODE_UNSUPPORTED"]
      ],
      as="SignInfoRequestFlags_mask",
      separator=", "
  )
